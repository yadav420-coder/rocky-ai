<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocky AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background-color: #121212; color: white; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header Style */
        .header { background: linear-gradient(135deg, #ff416c, #ff4b2b); padding: 20px; text-align: center; font-size: 24px; font-weight: bold; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* Chat Box */
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
        .user-msg { background-color: #0084ff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .rocky-msg { background-color: #2a2a2a; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #444; }
        
        /* Input Area */
        .input-area { padding: 15px; background-color: #1e1e1e; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; background-color: #2d2d2d; color: white; font-size: 16px; outline: none; }
        button { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">ROCKY AI</div>

    <div class="chat-container" id="chatContainer">
        <div class="message rocky-msg">Yo! Main hoon Rocky. Bol bhai, kya help chahiye tere ko?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Rocky se kuch pucho..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        // Rocky ka dimaag (Abhi hum basic replies set kar rahe hain)
        // Agle step mein isko asli AI se connect kar sakte hain API ke throug
        function getRockyResponse(userInput) {
            let input = userInput.toLowerCase();
            
            if (input.includes('hello') || input.includes('hi')) {
                return "Hello bhai! Kaise ho? Aaj Rocky kya karega tumhare liye?";
            } else if (input.includes('kaise ho')) {
                return "Ekdum jhakaas, mast! Tum batao, padhai-likhai kaisi chal rahi hai?";
            } else if (input.includes('naam')) {
                return "Mera naam Rocky hai, tere bhai ka apna AI assistant!";
            } else if (input.includes('apna app kaise banaye')) {
                return "Bhai, tum abhi wahi toh kar rahe ho! Tum coding seekh rahe ho, proud of you.";
            } else {
                return "Sahi baat hai bhai! Lekin abhi main thoda chota baccha hoon na, toh sab kuch nahi samajhta. Dhire-dhire seekh jaunga!";
            }
        }

        function sendMessage() {
            let inputField = document.getElementById("userInput");
            let userText = inputField.value.trim();
            if (userText === "") return;

            let chatContainer = document.getElementById("chatContainer");

            // User ka message screen par dikhao
            let userDiv = document.createElement("div");
            userDiv.className = "message user-msg";
            userDiv.innerText = userText;
            chatContainer.appendChild(userDiv);

            inputField.value = ""; // Input clear karo
            chatContainer.scrollTop = chatContainer.scrollHeight; // Auto scroll

            // Rocky ka reply generate karo thodi der baad (Loading feel ke liye)
            setTimeout(() => {
                let rockyReply = getRockyResponse(userText);
                let rockyDiv = document.createElement("div");
                rockyDiv.className = "message rocky-msg";
                rockyDiv.innerText = rockyReply;
                chatContainer.appendChild(rockyDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 600);
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>
</body>
          </html>
