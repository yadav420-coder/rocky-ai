<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocky AI</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        .chat-header { background-color: #1f1f1f; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; border-bottom: 2px solid #333; color: #00ffcc; }
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 16px; line-height: 1.4; word-wrap: break-word; }
        .user-msg { background-color: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .rocky-msg { background-color: #2a2a2a; color: #00ffcc; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #444; }
        .input-area { padding: 15px; background-color: #1f1f1f; display: flex; gap: 10px; border-top: 2px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background-color: #333; color: white; font-size: 16px; outline: none; }
        button { background-color: #00ffcc; color: black; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #00cc99; }
    </style>
</head>
<body>

    <div class="chat-header">⚡ ROCKY AI ⚡</div>
    
    <div class="chat-container" id="chatContainer">
        <div class="message rocky-msg">Bolo bhai! Main hoon Rocky. Aaj tera bhai teri kya madad kare?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Rocky se kuch bhi pucho..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
    
   <script>AQ.Ab8RN6JpS61MuBncQxqGepAEzOZh7QL_UKUJ3KKrBt1TNcluiQ
        const API_KEY = "";

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const messageText = inputField.value.trim();
            if (!messageText) return;

            appendMessage(messageText, "user-msg");
            inputField.value = "";

            const loadingId = appendMessage("Rocky soch raha hai...", "rocky-msg");

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "You are Rocky AI, a cool and helpful brotherly AI assistant who speaks friendly Hindi/Hinglish. Answer this question: " + messageText }] }]
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    let aiReply = data.candidates[0].content.parts[0].text;
                    appendMessage(aiReply, "rocky-msg");
                } else {
                    appendMessage("Bhai, thoda jhol ho gaya. Fir se pucho!", "rocky-msg");
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage("Net ka chakkar hai lagta hai bhai, reply nahi aaya.", "rocky-msg");
                console.error(error);
            }
        }

        function appendMessage(text, className) {
            const chatContainer = document.getElementById("chatContainer");
            const msgDiv = document.createElement("div");
            const uniqueId = "msg-" + Date.now();
            msgDiv.id = uniqueId;
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return uniqueId;
        }
    </script>
</body>
</html>
